<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="760" viewBox="0 0 1100 760">
  <rect width="1100" height="760" fill="#f7f4ea"/>

  <text x="60" y="70" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2937">
    Call Stack for recursive factorial(5)
  </text>
  <text x="60" y="108" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#4b5563">
    Push happens as calls go deeper. Pop happens as returns unwind back to the top.
  </text>

  <text x="120" y="170" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#0f766e">
    Push
  </text>
  <line x1="120" y1="180" x2="420" y2="180" stroke="#0f766e" stroke-width="4"/>
  <polygon points="420,180 402,170 402,190" fill="#0f766e"/>

  <text x="710" y="170" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#b45309">
    Pop / Return
  </text>
  <line x1="980" y1="180" x2="680" y2="180" stroke="#b45309" stroke-width="4"/>
  <polygon points="680,180 698,170 698,190" fill="#b45309"/>

  <rect x="380" y="220" width="340" height="440" rx="22" fill="#e5e7eb" stroke="#374151" stroke-width="4"/>
  <text x="470" y="700" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">
    Bottom of stack
  </text>

  <rect x="430" y="570" width="240" height="70" rx="14" fill="#d1fae5" stroke="#065f46" stroke-width="3"/>
  <text x="500" y="615" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#064e3b">
    factorial(5)
  </text>

  <rect x="430" y="490" width="240" height="70" rx="14" fill="#a7f3d0" stroke="#065f46" stroke-width="3"/>
  <text x="500" y="535" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#064e3b">
    factorial(4)
  </text>

  <rect x="430" y="410" width="240" height="70" rx="14" fill="#6ee7b7" stroke="#065f46" stroke-width="3"/>
  <text x="500" y="455" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#064e3b">
    factorial(3)
  </text>

  <rect x="430" y="330" width="240" height="70" rx="14" fill="#34d399" stroke="#065f46" stroke-width="3"/>
  <text x="500" y="375" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#064e3b">
    factorial(2)
  </text>

  <rect x="430" y="250" width="240" height="70" rx="14" fill="#10b981" stroke="#065f46" stroke-width="3"/>
  <text x="500" y="295" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#ecfeff">
    factorial(1)
  </text>

  <text x="70" y="250" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#065f46">
    1. call factorial(5)
  </text>
  <text x="70" y="290" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#065f46">
    2. push factorial(4)
  </text>
  <text x="70" y="330" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#065f46">
    3. push factorial(3)
  </text>
  <text x="70" y="370" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#065f46">
    4. push factorial(2)
  </text>
  <text x="70" y="410" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#065f46">
    5. push factorial(1)
  </text>
  <text x="70" y="450" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#065f46">
    Base case at factorial(1) returns 1
  </text>

  <text x="760" y="250" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#92400e">
    factorial(1) returns 1
  </text>
  <text x="760" y="300" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#92400e">
    factorial(2) returns 2 x 1 = 2
  </text>
  <text x="760" y="350" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#92400e">
    factorial(3) returns 3 x 2 = 6
  </text>
  <text x="760" y="400" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#92400e">
    factorial(4) returns 4 x 6 = 24
  </text>
  <text x="760" y="450" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#92400e">
    factorial(5) returns 5 x 24 = 120
  </text>

  <text x="760" y="540" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">
    Final answer: 120
  </text>
  <text x="760" y="580" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#4b5563">
    Push order: 5, 4, 3, 2, 1
  </text>
  <text x="760" y="615" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#4b5563">
    Pop order: 1, 2, 3, 4, 5
  </text>
</svg>
